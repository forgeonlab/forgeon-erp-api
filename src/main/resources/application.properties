spring.application.name=forgeon-api
spring.config.import=optional:file:.secrets.properties

# PostgreSQL (Supabase Free: prefira Transaction Pooler/porta 6543)
# Exemplo de URL:
# jdbc:postgresql://aws-0-REGION.pooler.supabase.com:6543/postgres?sslmode=require
# No pooler, o usuário geralmente é: postgres.<project-ref>
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require}
spring.datasource.username=${DB_USER:postgres.rzfsjaqjgfdmjcqkabkn}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# H2 console
spring.h2.console.settings.web-allow-others=true

# Auth básica
spring.security.user.name=admin
spring.security.user.password=admin

management.endpoints.web.exposure.include=*

# JWT
security.jwt.expiration=3600000
security.jwt.secret=UMA_CHAVE_MUITO_GRANDE_E_SEGURA_COM_NO_MINIMO_32_CARACTERES

# Access token
security.jwt.access-expiration=900000

# Refresh token
security.jwt.refresh-expiration=604800000

logging.level.org.springframework.security=DEBUG
