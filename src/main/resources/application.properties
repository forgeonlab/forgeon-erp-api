spring.application.name=forgeon-api
# ? ConfigurańŃo do banco
spring.datasource.url=jdbc:mysql://localhost:3306/forgeon_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=31052001

# ? Dialeto e driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ? Hibernate: criar/atualizar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# ? Mostrar as queries no console (opcional)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ? UUID + MySQL (ESSENCIAL)
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

# Permite acesso sem login ao console H2 e Swagger
spring.h2.console.settings.web-allow-others=true
spring.security.user.name=admin
spring.security.user.password=admin
management.endpoints.web.exposure.include=*

security.jwt.expiration=3600000
logging.level.org.springframework.security=DEBUG
security.jwt.secret=UMA_CHAVE_MUITO_GRANDE_E_SEGURA_COM_NO_MINIMO_32_CARACTERES

# Access token: 15 minutos
security.jwt.access-expiration=900000

# Refresh token: 7 dias
security.jwt.refresh-expiration=604800000
