spring.application.name=forgeon-api
# ? ConfigurańŃo do banco
spring.datasource.url=jdbc:mysql://localhost:3306/forgeon_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=31052001

# ? Dialeto e driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ? Hibernate: criar/atualizar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# ? Mostrar as queries no console (opcional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Permite acesso sem login ao console H2 e Swagger
spring.h2.console.settings.web-allow-others=true
spring.security.user.name=admin
spring.security.user.password=admin
management.endpoints.web.exposure.include=*
